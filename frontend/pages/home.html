<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR Web Tool</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

  <div class="container">

    <h1>Local OCR Tool</h1>

    <div id="dropzone">
      Drag & Drop PDF / Image Here
    </div>

    <input type="file" id="fileInput" hidden>

    <button onclick="uploadFile()">Run OCR</button>

    <p id="status">Waiting for file...</p>

    <pre id="output"></pre>

  </div>

  <script src="../scripts/app.js"></script>

</body>
</html>
