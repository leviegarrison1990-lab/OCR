<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR Web Tool</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

  <div class="container">

    <h1>Local OCR Tool</h1>

    <!-- Drop area -->
    <div id="dropzone">
      Drag & Drop PDF / Image Here
    </div>

    <!-- File picker (hidden) -->
    <input type="file" id="fileInput" hidden>

    <!-- Button -->
    <button onclick="uploadFile()">Run OCR</button>

    <!-- Status -->
    <p id="status">Waiting for file...</p>

    <!-- Output -->
    <pre id="output"></pre>

  </div>

  <script src="../scripts/app.js"></script>

</body>
</html>
